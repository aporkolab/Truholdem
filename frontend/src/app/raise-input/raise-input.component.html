<div class="raise-container" *ngIf="canRaise()">
	
	<button type="button" class="btn btn-primary raise-btn" (click)="showRaiseInput()">
		{{ getButtonLabel() }}
	</button>
</div>


<div *ngIf="isRaiseInputVisible" class="raise-overlay" (click)="cancelRaise()">
	<div class="raise-input-box" (click)="$event.stopPropagation()">
		<div class="raise-header">
			<h4>{{ getButtonLabel() }}</h4>
			<button class="close-btn" (click)="cancelRaise()">×</button>
		</div>

		<div class="raise-info">
			<div class="info-row">
				<span class="label">Minimum:</span>
				<span class="value">${{ minRaiseAmount }}</span>
			</div>
			<div class="info-row">
				<span class="label">Maximum (All-in):</span>
				<span class="value">${{ maxRaiseAmount }}</span>
			</div>
			<div class="info-row" *ngIf="game?.currentPot">
				<span class="label">Current Pot:</span>
				<span class="value">${{ game.currentPot }}</span>
			</div>
		</div>

		
		<div class="quick-bets">
			<button type="button" class="btn btn-outline-secondary btn-sm" (click)="setMinRaise()">
				Min
			</button>
			<button type="button" class="btn btn-outline-secondary btn-sm" (click)="setHalfPot()" 
				*ngIf="game?.currentPot > 0">
				½ Pot
			</button>
			<button type="button" class="btn btn-outline-secondary btn-sm" (click)="setFullPot()"
				*ngIf="game?.currentPot > 0">
				Pot
			</button>
			<button type="button" class="btn btn-outline-warning btn-sm" (click)="setAllIn()">
				All-In
			</button>
		</div>

		
		<div class="amount-input">
			<label for="raiseAmount">Amount:</label>
			<div class="input-group">
				<span class="input-prefix">$</span>
				<input 
					type="number" 
					id="raiseAmount"
					[(ngModel)]="raiseAmount" 
					[min]="minRaiseAmount" 
					[max]="maxRaiseAmount"
					placeholder="Enter amount"
					class="form-control" />
			</div>
			
			<input 
				type="range" 
				class="form-range"
				[(ngModel)]="raiseAmount"
				[min]="minRaiseAmount"
				[max]="maxRaiseAmount"
				step="10" />
		</div>

		
		<div *ngIf="errorMessage" class="error-message">
			{{ errorMessage }}
		</div>

		
		<div class="raise-actions">
			<button type="button" class="btn btn-success btn-lg" (click)="confirmRaise()">
				{{ getButtonLabel() }} ${{ raiseAmount }}
			</button>
			<button type="button" class="btn btn-secondary" (click)="cancelRaise()">
				Cancel
			</button>
		</div>
	</div>
</div>
