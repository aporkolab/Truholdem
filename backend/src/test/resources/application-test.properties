# Test Database Configuration - H2 in PostgreSQL mode
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Liquibase for tests
spring.liquibase.enabled=false

# Test Security Configuration
app.jwt.secret=testSecretKeyForTesting_AtLeast32Chars_LongEnough!!
app.jwt.expiration=3600000
app.jwt.refresh-expiration=7200000

# Disable external dependencies for tests
spring.data.redis.repositories.enabled=false
spring.cache.type=none
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.websocket.servlet.WebSocketServletAutoConfiguration

# Game Configuration  
app.game.default-chips=1000
app.game.default-small-blind=10
app.game.default-big-blind=20
app.game.max-players=10
app.game.min-players=2
app.game.bot-think-time=100
s
# CORS Configuration
app.cors.allowed-origins=http://localhost:4200

# Logging - minimal for tests
logging.level.root=WARN
logging.level.com.truholdem=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

# Disable WebSocket for tests
app.websocket.enabled=false

# Disable rate limiting for tests
rate-limit.enabled=false
app.game.botThinkTime=100


app.jwt.secret=test-secret
app.jwt.expiration=3600
app.jwt.refreshExpiration=7200

app.cors.allowedOrigins=*
app.cors.allowedMethods=GET,POST,PUT,DELETE
app.cors.allowedHeaders=*

app.websocket.allowedOrigins=*

